<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Knitting Studio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root {
  --cream:#f5f0e8; --parchment:#fffdf7; --parchment-d:#f0e8d8;
  --ink:#3d3222; --ink-mid:#7a5c3a; --ink-light:#9a8068; --ink-faint:#c8b89a;
  --sage:#8fac78; --sage-dark:#5a7a48; --sage-light:#d4e6c8;
  --terra:#b87a72; --terra-light:#ecd4d0;
  --sand:#c8a882; --sand-light:#ede0cc;
  --sky:#7a9eb5; --sky-light:#ccdde8;
  --lav:#9b8ec4; --lav-light:#e4dff5;
  --border:#c8b89a; --border-soft:#e0d5c0;
  --f-display:'Fraunces',Georgia,serif;
  --f-body:'Jost','Helvetica Neue',Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);font-family:var(--f-body);font-weight:300;color:var(--ink);min-height:100vh;background-image:repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(180,155,110,0.07) 27px,rgba(180,155,110,0.07) 28px);}

/* HEADER */
.app-header{background:var(--parchment);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;}
.app-title{font-family:var(--f-display);font-size:30px;font-weight:300;font-style:italic;color:var(--ink);letter-spacing:-0.5px;line-height:1;}
.app-title em{font-style:normal;color:var(--terra);font-weight:400;}
.header-actions{display:flex;gap:8px;}
.btn-utility{font-family:var(--f-body);font-size:10px;font-weight:400;letter-spacing:1.5px;text-transform:uppercase;padding:6px 12px;border:1px solid var(--border);background:transparent;color:var(--ink-mid);cursor:pointer;border-radius:2px;}
.btn-utility:hover{background:var(--parchment-d);}

/* NAV */
.nav-tabs{background:var(--parchment);border-bottom:1px solid var(--border);display:flex;padding:0 24px;overflow-x:auto;}
.nav-tab{font-family:var(--f-body);font-size:11px;font-weight:400;letter-spacing:2px;text-transform:uppercase;padding:13px 18px 11px;cursor:pointer;border:none;background:transparent;color:var(--ink-light);border-bottom:2px solid transparent;transition:all .15s;position:relative;top:1px;white-space:nowrap;}
.nav-tab:hover{color:var(--ink);}
.nav-tab.active{color:var(--ink);border-bottom:2px solid var(--ink);}

/* PAGES */
.page{display:none;padding:24px;max-width:1200px;margin:0 auto;}
.page.active{display:block;}

/* SECTION HEADER */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border-soft);gap:12px;flex-wrap:wrap;}
.section-title{font-family:var(--f-display);font-size:26px;font-weight:300;font-style:italic;color:var(--ink);}
.section-header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
.search-input{font-family:var(--f-body);font-size:12px;font-weight:300;padding:7px 14px;border:1px solid var(--border);background:var(--parchment);color:var(--ink);width:200px;outline:none;border-radius:2px;}
.search-input:focus{border-color:var(--ink-mid);}
.search-input::placeholder{color:var(--ink-faint);}
.filter-select{font-family:var(--f-body);font-size:11px;font-weight:300;padding:7px 12px;border:1px solid var(--border);background:var(--parchment);color:var(--ink-mid);outline:none;border-radius:2px;cursor:pointer;appearance:none;}
.filter-select:focus{border-color:var(--ink-mid);}

/* BUTTONS */
.btn-add{font-family:var(--f-body);font-size:10px;font-weight:400;letter-spacing:2px;text-transform:uppercase;padding:8px 16px;border:1px solid var(--ink);background:var(--ink);color:var(--cream);cursor:pointer;border-radius:2px;}
.btn-add:hover{background:var(--ink-mid);}
.btn-sm{font-family:var(--f-body);font-size:10px;font-weight:400;letter-spacing:1.5px;text-transform:uppercase;padding:4px 10px;border:1px solid var(--border);background:transparent;color:var(--ink-mid);cursor:pointer;border-radius:1px;}
.btn-sm:hover{background:var(--parchment-d);color:var(--ink);}
.btn-sm.danger:hover{background:var(--terra-light);color:var(--terra);border-color:var(--terra);}
.btn-open{font-family:var(--f-body);font-size:10px;font-weight:400;letter-spacing:2px;text-transform:uppercase;padding:6px 14px;border:1px solid var(--ink-mid);background:transparent;color:var(--ink-mid);cursor:pointer;border-radius:1px;white-space:nowrap;}
.btn-open:hover{background:var(--ink);color:var(--cream);border-color:var(--ink);}

/* CARDS GRID */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;}
@media(min-width:900px){.cards-grid{grid-template-columns:repeat(auto-fill,minmax(300px,1fr));}}
@media(min-width:1100px){.cards-grid{grid-template-columns:repeat(auto-fill,minmax(320px,1fr));}}

/* PROJECT CARD */
.card{background:var(--parchment);border:1px solid var(--border);border-radius:2px;overflow:hidden;transition:transform .15s,box-shadow .15s;box-shadow:2px 2px 0 var(--border-soft);}
.card:hover{transform:translateY(-2px);box-shadow:4px 4px 0 var(--border);}
.card-photos{position:relative;width:100%;height:170px;background:var(--parchment-d);border-bottom:1px solid var(--border);overflow:hidden;cursor:pointer;}
.card-photos img{width:100%;height:100%;object-fit:cover;display:block;}
.card-photos-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:var(--f-display);font-style:italic;font-size:13px;color:var(--ink-faint);}
.photo-count-badge{position:absolute;bottom:8px;right:8px;background:rgba(61,50,34,.6);color:var(--cream);font-family:var(--f-body);font-size:10px;letter-spacing:1px;padding:3px 8px;border-radius:10px;}
.card-body{padding:14px 16px;}
.card-title{font-family:var(--f-display);font-size:19px;font-weight:400;color:var(--ink);margin-bottom:4px;line-height:1.2;}
.card-meta{font-family:var(--f-body);font-size:11px;font-weight:300;color:var(--ink-light);margin-bottom:8px;line-height:1.6;}
.card-meta a{color:var(--sky);text-decoration:none;}
.card-meta a:hover{text-decoration:underline;}
.card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.status-badge{display:inline-block;font-family:var(--f-body);font-size:9px;font-weight:400;letter-spacing:2px;text-transform:uppercase;padding:3px 9px;border-radius:1px;}
.status-not-started{background:var(--sand-light);color:#6b4e2a;border:1px solid var(--sand);}
.status-in-progress{background:var(--sage-light);color:var(--sage-dark);border:1px solid var(--sage);}
.status-completed{background:var(--sky-light);color:#3a617a;border:1px solid var(--sky);}
.status-on-hold{background:var(--terra-light);color:#7a3a34;border:1px solid var(--terra);}
.progress-wrap{background:var(--parchment-d);height:3px;margin-bottom:4px;overflow:hidden;}
.progress-fill{height:100%;background:var(--sage-dark);}
.progress-label{font-family:var(--f-body);font-size:10px;font-weight:300;letter-spacing:1px;color:var(--ink-light);text-align:right;margin-bottom:8px;}
.chip-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;align-items:center;}
.yarn-chip{width:14px;height:14px;border-radius:50%;border:1px solid rgba(61,50,34,.2);display:inline-block;}
.linked-badge{font-family:var(--f-body);font-size:9px;font-weight:400;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:1px;border:1px solid var(--lav);background:var(--lav-light);color:#4a3a7a;}
.card-footer{border-top:1px solid var(--border-soft);padding:9px 16px;display:flex;gap:6px;}

/* YARN CARD */
.yarn-card{background:var(--parchment);border:1px solid var(--border);border-radius:2px;padding:14px 16px;display:flex;gap:14px;align-items:flex-start;box-shadow:2px 2px 0 var(--border-soft);transition:transform .15s;}
.yarn-card:hover{transform:translateY(-2px);}
.yarn-swatch-lg{width:44px;height:44px;border-radius:50%;border:1px solid rgba(61,50,34,.2);flex-shrink:0;}
.yarn-name{font-family:var(--f-display);font-size:17px;font-weight:400;color:var(--ink);margin-bottom:2px;}
.yarn-detail{font-family:var(--f-body);font-size:11px;font-weight:300;color:var(--ink-light);line-height:1.6;}
.weight-badge{display:inline-block;font-family:var(--f-body);font-size:9px;font-weight:400;letter-spacing:1.5px;text-transform:uppercase;padding:2px 7px;border:1px solid var(--sand);background:var(--sand-light);color:#6b4e2a;border-radius:1px;margin-top:4px;}
.yardage-warn{color:var(--terra);font-size:10px;font-weight:400;margin-top:3px;}

/* NEEDLE CARD */
.needle-card{background:var(--parchment);border:1px solid var(--border);border-radius:2px;padding:14px 16px;display:flex;gap:14px;align-items:flex-start;box-shadow:2px 2px 0 var(--border-soft);transition:transform .15s;}
.needle-card:hover{transform:translateY(-2px);}
.needle-icon{width:44px;height:44px;border-radius:50%;background:var(--sand-light);border:1px solid var(--sand);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;}
.needle-size{font-family:var(--f-display);font-size:17px;font-weight:400;color:var(--ink);margin-bottom:2px;}
.needle-detail{font-family:var(--f-body);font-size:11px;font-weight:300;color:var(--ink-light);line-height:1.6;}
.avail-badge{display:inline-block;font-family:var(--f-body);font-size:9px;font-weight:400;letter-spacing:1.5px;text-transform:uppercase;padding:2px 7px;border-radius:1px;margin-top:4px;}
.avail-ok{border:1px solid var(--sage);background:var(--sage-light);color:var(--sage-dark);}
.avail-busy{border:1px solid var(--terra);background:var(--terra-light);color:#7a3a34;}

/* ACQUIRE LIST */
.acquire-card{background:var(--parchment);border:1px solid var(--border);border-radius:2px;padding:12px 16px;display:flex;gap:12px;align-items:center;box-shadow:2px 2px 0 var(--border-soft);transition:all .15s;}
.acquire-card:hover{transform:translateY(-1px);}
.acquire-check{width:22px;height:22px;border:1.5px solid var(--border);border-radius:50%;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.acquire-check:hover{border-color:var(--sage-dark);background:var(--sage-light);}
.acquire-name{font-family:var(--f-display);font-size:16px;font-weight:400;color:var(--ink);flex:1;}
.acquire-meta{font-family:var(--f-body);font-size:11px;font-weight:300;color:var(--ink-light);}
.acquire-meta a{color:var(--sky);text-decoration:none;}
.priority-badge{font-family:var(--f-body);font-size:9px;font-weight:400;letter-spacing:1.5px;text-transform:uppercase;padding:2px 7px;border-radius:1px;}
.priority-must{border:1px solid var(--terra);background:var(--terra-light);color:#7a3a34;}
.priority-wanting{border:1px solid var(--sand);background:var(--sand-light);color:#6b4e2a;}
.priority-nice{border:1px solid var(--border);background:var(--parchment-d);color:var(--ink-light);}

/* PATTERN CARD */
.pattern-card{background:var(--parchment);border:1px solid var(--border);border-radius:2px;overflow:hidden;box-shadow:2px 2px 0 var(--border-soft);transition:transform .15s;}
.pattern-card:hover{transform:translateY(-1px);}
.pattern-card-inner{padding:14px 16px;display:flex;gap:14px;align-items:center;}
.pattern-icon{width:44px;height:56px;background:var(--parchment-d);border:1px solid var(--border);border-radius:1px 8px 1px 1px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;position:relative;}
.pattern-icon::after{content:'';position:absolute;top:-1px;right:-1px;border-style:solid;border-width:0 9px 9px 0;border-color:transparent var(--cream) transparent transparent;}
.pattern-info{flex:1;}
.pattern-name{font-family:var(--f-display);font-size:17px;font-weight:400;font-style:italic;color:var(--ink);margin-bottom:3px;}
.pattern-meta{font-family:var(--f-body);font-size:11px;font-weight:300;color:var(--ink-light);}
.pattern-actions{display:flex;gap:8px;align-items:center;}

/* STASH SECTION */
.stash-section{margin-bottom:32px;}
.stash-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border-soft);}
.stash-section-title{font-family:var(--f-display);font-size:22px;font-weight:300;font-style:italic;color:var(--ink);}
.stash-section-toggle{font-family:var(--f-body);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-light);background:none;border:none;cursor:pointer;padding:4px 8px;}
.list-stack{display:flex;flex-direction:column;gap:10px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(61,50,34,.4);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.hidden{display:none;}
.modal{background:var(--parchment);border:1px solid var(--border);border-radius:2px;box-shadow:6px 6px 0 var(--border);width:100%;max-width:580px;max-height:92vh;overflow-y:auto;padding:24px;}
.modal-title{font-family:var(--f-display);font-size:24px;font-weight:300;font-style:italic;color:var(--ink);margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border-soft);}
.form-group{margin-bottom:14px;}
.form-label{font-family:var(--f-body);font-size:10px;font-weight:400;letter-spacing:2px;text-transform:uppercase;color:var(--ink-mid);display:block;margin-bottom:5px;}
.form-input,.form-select,.form-textarea{width:100%;font-family:var(--f-body);font-size:13px;font-weight:300;padding:8px 12px;border:1px solid var(--border);background:var(--cream);color:var(--ink);outline:none;border-radius:1px;appearance:none;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--ink-mid);}
.form-textarea{resize:vertical;min-height:70px;line-height:1.6;}
.form-row{display:flex;gap:10px;}
.form-row>*{flex:1;}
.form-range{width:100%;accent-color:var(--sage-dark);cursor:pointer;}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:14px;border-top:1px solid var(--border-soft);}
.btn-cancel{font-family:var(--f-body);font-size:11px;font-weight:400;letter-spacing:1.5px;text-transform:uppercase;padding:8px 16px;border:1px solid var(--border);background:transparent;color:var(--ink-light);cursor:pointer;border-radius:1px;}
.btn-save{font-family:var(--f-body);font-size:11px;font-weight:400;letter-spacing:2px;text-transform:uppercase;padding:8px 20px;border:1px solid var(--ink);background:var(--ink);color:var(--cream);cursor:pointer;border-radius:1px;}
.btn-save:hover{background:var(--ink-mid);}

/* YARN / NEEDLE SELECTORS */
.chip-selector{display:flex;flex-wrap:wrap;gap:6px;}
.chip-sel-item{display:flex;align-items:center;gap:5px;padding:4px 10px;border:1px solid var(--border);border-radius:1px;cursor:pointer;font-family:var(--f-body);font-size:12px;font-weight:300;color:var(--ink-mid);background:var(--cream);}
.chip-sel-item.selected{border-color:var(--sage-dark);background:var(--sage-light);color:var(--sage-dark);}
.chip-dot{width:11px;height:11px;border-radius:50%;border:1px solid rgba(61,50,34,.15);flex-shrink:0;}

/* PHOTO SECTION */
.photo-upload{border:1px dashed var(--border);padding:14px;text-align:center;cursor:pointer;font-family:var(--f-body);font-size:11px;font-weight:300;color:var(--ink-light);background:var(--cream);border-radius:1px;}
.photo-upload:hover{background:var(--parchment-d);}
.photo-journal{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.photo-thumb-wrap{position:relative;display:inline-block;}
.photo-thumb{width:72px;height:72px;object-fit:cover;border:1px solid var(--border);border-radius:2px;display:block;}
.photo-thumb-del{position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:var(--terra);border:none;border-radius:50%;color:white;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}
.photo-thumb-date{font-family:var(--f-body);font-size:9px;color:var(--ink-faint);text-align:center;margin-top:2px;width:72px;}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(20,14,8,.92);z-index:3000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
.lightbox.hidden{display:none;}
.lightbox img{max-width:92vw;max-height:80vh;object-fit:contain;border:1px solid var(--border);}
.lightbox-close{font-family:var(--f-body);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--sand);background:none;border:1px solid #5a4a2a;padding:6px 16px;cursor:pointer;border-radius:1px;}
.lightbox-caption{font-family:var(--f-body);font-size:11px;color:var(--ink-faint);letter-spacing:1px;}

/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;}
.empty-title{font-family:var(--f-display);font-size:20px;font-weight:300;font-style:italic;color:var(--ink-light);margin-bottom:6px;}
.empty-sub{font-family:var(--f-body);font-size:12px;font-weight:300;color:var(--ink-faint);}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:var(--cream);font-family:var(--f-body);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;padding:10px 22px;border-radius:2px;z-index:5000;transition:transform .25s ease,opacity .25s ease;opacity:0;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* PDF VIEWER */
#pdf-viewer{position:fixed;inset:0;background:#2a2016;z-index:2000;display:flex;flex-direction:column;touch-action:none;}
#pdf-viewer.hidden{display:none;}
.pdf-toolbar{background:#1e160e;border-bottom:1px solid #5a4a2a;padding:8px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0;}
.pdf-title{font-family:var(--f-display);font-size:17px;font-weight:300;font-style:italic;color:#ede0cc;flex:1;min-width:60px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pdf-btn{font-family:var(--f-body);font-size:10px;font-weight:400;letter-spacing:1.5px;text-transform:uppercase;padding:5px 10px;border:1px solid #5a4a2a;background:transparent;color:#c8a882;cursor:pointer;border-radius:1px;white-space:nowrap;-webkit-user-select:none;user-select:none;}
.pdf-btn:hover{background:#2a2016;}
.pdf-btn.active{background:var(--terra);border-color:var(--terra);color:#fffdf7;}
.pdf-page-info{font-family:var(--f-body);font-size:11px;font-weight:300;letter-spacing:1px;color:#8a7060;white-space:nowrap;}
.zoom-info{font-family:var(--f-body);font-size:10px;letter-spacing:1px;color:#6a5a40;white-space:nowrap;min-width:36px;text-align:center;}
.counter-widget{display:flex;align-items:center;gap:2px;border:1px solid #5a4a2a;border-radius:1px;padding:2px 6px;background:#1e160e;}
.counter-label{font-family:var(--f-body);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#8a7060;margin-right:3px;}
.counter-val{font-family:var(--f-display);font-size:22px;font-weight:300;color:var(--sand);min-width:28px;text-align:center;line-height:1;}
.counter-btn{font-size:15px;background:none;border:none;cursor:pointer;color:#8a7060;width:20px;height:20px;display:flex;align-items:center;justify-content:center;padding:0;-webkit-user-select:none;user-select:none;}
.counter-btn:hover{color:var(--sand);}
.pdf-body{flex:1;display:flex;overflow:hidden;}
.pdf-canvas-area{flex:1;overflow:hidden;display:flex;align-items:flex-start;justify-content:center;background:#362a1a;position:relative;touch-action:none;}
.pdf-canvas-scroll{overflow:auto;width:100%;height:100%;display:flex;align-items:flex-start;justify-content:center;padding:20px;}
.pdf-page-wrap{position:relative;display:inline-block;box-shadow:0 4px 24px rgba(0,0,0,.5);flex-shrink:0;transform-origin:top center;}
#pdf-canvas{display:block;}
#row-highlight{position:absolute;left:0;right:0;height:26px;background:rgba(200,168,130,.22);border-top:1.5px solid rgba(200,168,130,.6);border-bottom:1.5px solid rgba(200,168,130,.6);cursor:ns-resize;display:none;z-index:10;touch-action:none;}
#row-highlight.visible{display:block;}
.hl-label{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-family:var(--f-body);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:rgba(200,168,130,.7);pointer-events:none;}
.notes-panel{width:260px;background:#1e160e;border-left:1px solid #5a4a2a;display:flex;flex-direction:column;flex-shrink:0;transition:width .2s;}
.notes-panel.collapsed{width:32px;}
.notes-toggle{background:none;border:none;border-bottom:1px solid #3a2a18;color:#8a7060;cursor:pointer;font-size:13px;padding:9px;text-align:center;width:100%;}
.notes-toggle:hover{color:var(--sand);}
.notes-content{display:flex;flex-direction:column;flex:1;overflow:hidden;}
.notes-panel.collapsed .notes-content{display:none;}
.notes-head{font-family:var(--f-body);font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:#8a7060;padding:9px 12px;border-bottom:1px solid #3a2a18;}
.notes-list{flex:1;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:6px;}
.note-card{background:#2a2016;border:1px solid #4a3a22;overflow:hidden;}
.note-card-head{background:#362a1a;padding:4px 8px;font-family:var(--f-body);font-size:10px;letter-spacing:1px;color:#c8a882;display:flex;justify-content:space-between;align-items:center;}
.btn-del-note{background:none;border:none;color:#6a5a40;cursor:pointer;font-size:13px;padding:0;line-height:1;}
.btn-del-note:hover{color:var(--terra);}
.note-ta{width:100%;background:transparent;border:none;outline:none;resize:none;font-family:var(--f-body);font-size:12px;font-weight:300;color:#e0d0b8;padding:7px 9px;min-height:55px;line-height:1.6;}
.btn-add-note{font-family:var(--f-body);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;margin:6px;padding:6px 10px;border:1px dashed #4a3a22;background:transparent;color:#8a7060;cursor:pointer;width:calc(100% - 12px);}
.btn-add-note:hover{color:var(--sand);border-color:#8a7060;}
.hidden{display:none!important;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--parchment-d);}
::-webkit-scrollbar-thumb{background:var(--border);}
</style>
</head>
<body>

<header class="app-header">
  <div class="app-title">Knitting <em>Studio</em></div>
  <div class="header-actions">
    <button class="btn-utility" onclick="exportBackup()">Export</button>
    <button class="btn-utility" onclick="document.getElementById('import-file').click()">Import</button>
    <input type="file" id="import-file" accept=".json" class="hidden" onchange="importBackup(event)">
  </div>
</header>

<nav class="nav-tabs">
  <button class="nav-tab active" onclick="switchTab('projects')">Projects</button>
  <button class="nav-tab" onclick="switchTab('stash')">The Stash</button>
  <button class="nav-tab" onclick="switchTab('patterns')">Patterns</button>
</nav>

<!-- PROJECTS -->
<div id="page-projects" class="page active">
  <div class="section-header">
    <div class="section-title">My Projects</div>
    <button class="btn-add" onclick="openProjectModal()">+ Add Project</button>
  </div>
  <div class="filter-bar">
    <input class="search-input" type="text" placeholder="Search projects…" id="proj-search" oninput="renderProjects()">
    <select class="filter-select" id="proj-filter-status" onchange="renderProjects()">
      <option value="">All Statuses</option>
      <option value="not-started">Not Started</option>
      <option value="in-progress">In Progress</option>
      <option value="completed">Completed</option>
      <option value="on-hold">On Hold</option>
    </select>
    <select class="filter-select" id="proj-sort" onchange="renderProjects()">
      <option value="newest">Newest First</option>
      <option value="oldest">Oldest First</option>
      <option value="name">Name A–Z</option>
      <option value="progress">Progress</option>
    </select>
  </div>
  <div class="cards-grid" id="projects-grid"></div>
</div>

<!-- THE STASH -->
<div id="page-stash" class="page">
  <!-- YARN -->
  <div class="stash-section" id="stash-yarn-section">
    <div class="stash-section-header">
      <div class="stash-section-title">Yarn</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <input class="search-input" type="text" placeholder="Search yarn…" id="yarn-search" oninput="renderYarn()" style="width:160px;">
        <button class="btn-add" onclick="openYarnModal()">+ Add</button>
      </div>
    </div>
    <div class="cards-grid" id="yarn-grid"></div>
  </div>

  <!-- NEEDLES -->
  <div class="stash-section" id="stash-needle-section">
    <div class="stash-section-header">
      <div class="stash-section-title">Knitting Needles</div>
      <button class="btn-add" onclick="openNeedleModal()">+ Add</button>
    </div>
    <div class="cards-grid" id="needle-grid"></div>
  </div>

  <!-- ACQUIRE -->
  <div class="stash-section">
    <div class="stash-section-header">
      <div class="stash-section-title">Items to Acquire</div>
      <button class="btn-add" onclick="openAcquireModal()">+ Add</button>
    </div>
    <div class="list-stack" id="acquire-list"></div>
  </div>
</div>

<!-- PATTERNS -->
<div id="page-patterns" class="page">
  <div class="section-header">
    <div class="section-title">Patterns</div>
    <button class="btn-add" onclick="openPatternModal()">+ Add Pattern</button>
  </div>
  <div class="cards-grid" id="patterns-list"></div>
</div>

<!-- PROJECT MODAL -->
<div class="modal-overlay hidden" id="proj-modal">
  <div class="modal">
    <div class="modal-title" id="proj-modal-title">New Project</div>
    <div class="form-group"><label class="form-label">Project Name</label><input class="form-input" id="p-name" type="text" placeholder="e.g. Cozy Winter Sweater"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Status</label><select class="form-select" id="p-status"><option value="not-started">Not Started</option><option value="in-progress">In Progress</option><option value="completed">Completed</option><option value="on-hold">On Hold</option></select></div>
      <div class="form-group"><label class="form-label">Needle Size</label><input class="form-input" id="p-needle" type="text" placeholder="US 7 / 4.5mm"></div>
    </div>
    <div class="form-group"><label class="form-label">Ravelry URL</label><input class="form-input" id="p-ravelry" type="url" placeholder="https://www.ravelry.com/patterns/…"></div>
    <div class="form-group"><label class="form-label">Linked Pattern</label><select class="form-select" id="p-pattern"><option value="">None</option></select></div>
    <div class="form-group"><label class="form-label">Progress — <span id="p-prog-val">0</span>%</label><input class="form-range" id="p-prog" type="range" min="0" max="100" value="0" step="1" oninput="document.getElementById('p-prog-val').textContent=this.value"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Start Date</label><input class="form-input" id="p-start" type="date"></div>
      <div class="form-group"><label class="form-label">End Date</label><input class="form-input" id="p-end" type="date"></div>
    </div>
    <div class="form-group"><label class="form-label">Target Yardage</label><input class="form-input" id="p-target-yards" type="number" placeholder="e.g. 1200"></div>
    <div class="form-group"><label class="form-label">Yarn Used</label><div class="chip-selector" id="p-yarn-sel"></div></div>
    <div class="form-group"><label class="form-label">Needles Used</label><div class="chip-selector" id="p-needle-sel"></div></div>
    <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="p-notes" placeholder="Modifications, stitch counts, reminders…"></textarea></div>
    <div class="form-group">
      <label class="form-label">Progress Photos</label>
      <div class="photo-upload" onclick="document.getElementById('p-photo-input').click()">+ Add photo</div>
      <input type="file" id="p-photo-input" accept="image/*" class="hidden" onchange="handleProjectPhoto(event)">
      <div class="photo-journal" id="p-photo-journal"></div>
    </div>
    <div class="modal-footer"><button class="btn-cancel" onclick="closeModal('proj-modal')">Cancel</button><button class="btn-save" onclick="saveProject()">Save Project</button></div>
  </div>
</div>

<!-- YARN MODAL -->
<div class="modal-overlay hidden" id="yarn-modal">
  <div class="modal">
    <div class="modal-title" id="yarn-modal-title">Add Yarn</div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Yarn Name</label><input class="form-input" id="y-name" type="text" placeholder="e.g. Cascade 220"></div>
      <div class="form-group"><label class="form-label">Brand</label><input class="form-input" id="y-brand" type="text" placeholder="e.g. Lion Brand"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Colour Name</label><input class="form-input" id="y-colname" type="text" placeholder="e.g. Dusty Rose"></div>
      <div class="form-group"><label class="form-label">Colour Swatch</label><input type="color" id="y-colour" value="#8fac78" style="width:100%;height:36px;border:1px solid var(--border);border-radius:1px;cursor:pointer;"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Weight</label><select class="form-select" id="y-weight"><option>Lace</option><option>Fingering</option><option>Sport</option><option>DK</option><option selected>Worsted</option><option>Aran</option><option>Bulky</option><option>Super Bulky</option></select></div>
      <div class="form-group"><label class="form-label">Fibre Content</label><input class="form-input" id="y-fibre" type="text" placeholder="100% Merino"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Yardage / Skein</label><input class="form-input" id="y-yards" type="number" placeholder="220"></div>
      <div class="form-group"><label class="form-label">Number of Skeins</label><input class="form-input" id="y-skeins" type="number" value="1"></div>
    </div>
    <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="y-notes" placeholder="Dye lot, care instructions…"></textarea></div>
    <div class="modal-footer"><button class="btn-cancel" onclick="closeModal('yarn-modal')">Cancel</button><button class="btn-save" onclick="saveYarn()">Save Yarn</button></div>
  </div>
</div>

<!-- NEEDLE MODAL -->
<div class="modal-overlay hidden" id="needle-modal">
  <div class="modal">
    <div class="modal-title" id="needle-modal-title">Add Needles</div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">US Size</label><input class="form-input" id="n-us" type="text" placeholder="e.g. US 7"></div>
      <div class="form-group"><label class="form-label">Metric (mm)</label><input class="form-input" id="n-mm" type="text" placeholder="e.g. 4.5mm"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Type</label><select class="form-select" id="n-type"><option>Straight</option><option>Circular</option><option>DPN</option><option>Cable</option><option>Interchangeable</option></select></div>
      <div class="form-group"><label class="form-label">Material</label><select class="form-select" id="n-material"><option>Metal</option><option>Wood</option><option>Bamboo</option><option>Plastic</option><option>Carbon Fibre</option></select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Length (for circulars)</label><input class="form-input" id="n-length" type="text" placeholder='e.g. 32"'></div>
      <div class="form-group"><label class="form-label">Brand</label><input class="form-input" id="n-brand" type="text" placeholder="e.g. Addi"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Quantity Owned</label><input class="form-input" id="n-qty" type="number" value="1" min="1"></div>
      <div class="form-group"><label class="form-label">Notes</label><input class="form-input" id="n-notes" type="text" placeholder="Optional"></div>
    </div>
    <div class="modal-footer"><button class="btn-cancel" onclick="closeModal('needle-modal')">Cancel</button><button class="btn-save" onclick="saveNeedle()">Save Needles</button></div>
  </div>
</div>

<!-- ACQUIRE MODAL -->
<div class="modal-overlay hidden" id="acquire-modal">
  <div class="modal">
    <div class="modal-title" id="acquire-modal-title">Add Item to Acquire</div>
    <div class="form-group"><label class="form-label">Item Name</label><input class="form-input" id="aq-name" type="text" placeholder="e.g. Malabrigo Rios in Azul Profundo"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Type</label><select class="form-select" id="aq-type"><option>Yarn</option><option>Needles</option><option>Notions</option><option>Pattern</option><option>Other</option></select></div>
      <div class="form-group"><label class="form-label">Priority</label><select class="form-select" id="aq-priority"><option value="must">Must Have</option><option value="wanting">Wanting</option><option value="nice" selected>Nice to Have</option></select></div>
    </div>
    <div class="form-group"><label class="form-label">Link / Notes</label><input class="form-input" id="aq-notes" type="text" placeholder="URL or notes"></div>
    <div class="modal-footer"><button class="btn-cancel" onclick="closeModal('acquire-modal')">Cancel</button><button class="btn-save" onclick="saveAcquire()">Save Item</button></div>
  </div>
</div>

<!-- PATTERN MODAL -->
<div class="modal-overlay hidden" id="pat-modal">
  <div class="modal">
    <div class="modal-title">Add Pattern</div>
    <div class="form-group"><label class="form-label">Pattern Name</label><input class="form-input" id="pat-name" type="text" placeholder="e.g. Heirloom Lace Shawl"></div>
    <div class="form-group">
      <label class="form-label">PDF File</label>
      <div class="photo-upload" id="pdf-upload-label" onclick="document.getElementById('pat-pdf-input').click()">Click to choose a PDF file</div>
      <input type="file" id="pat-pdf-input" accept="application/pdf" class="hidden" onchange="handlePdfUpload(event)">
      <input type="hidden" id="pat-pdf-data">
    </div>
    <div class="modal-footer"><button class="btn-cancel" onclick="closeModal('pat-modal')">Cancel</button><button class="btn-save" onclick="savePattern()">Save Pattern</button></div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox hidden" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="">
  <div class="lightbox-caption" id="lightbox-caption"></div>
  <button class="lightbox-close">Close</button>
</div>

<!-- PDF VIEWER -->
<div id="pdf-viewer" class="hidden">
  <div class="pdf-toolbar">
    <button class="pdf-btn" onclick="closePdf()">✕ Close</button>
    <div class="pdf-title" id="pdf-title">Pattern</div>
    <button class="pdf-btn" onclick="changePage(-1)">← Prev</button>
    <span class="pdf-page-info" id="pdf-page-info">1 / 1</span>
    <button class="pdf-btn" onclick="changePage(1)">Next →</button>
    <button class="pdf-btn" id="hl-btn" onclick="toggleHighlight()">Highlight</button>
    <button class="pdf-btn" onclick="resetZoom()">Fit</button>
    <span class="zoom-info" id="zoom-info">100%</span>
    <div class="counter-widget">
      <span class="counter-label">Row</span>
      <button class="counter-btn" onclick="cDown()">−</button>
      <span class="counter-val" id="c-val">1</span>
      <button class="counter-btn" onclick="cUp()">+</button>
      <button class="counter-btn" onclick="cReset()" style="font-size:11px" title="Reset">↺</button>
    </div>
    <button class="pdf-btn" onclick="addNote()">+ Note</button>
  </div>
  <div class="pdf-body">
    <div class="pdf-canvas-area" id="pdf-canvas-area">
      <div class="pdf-canvas-scroll" id="pdf-canvas-scroll">
        <div class="pdf-page-wrap" id="pdf-page-wrap">
          <canvas id="pdf-canvas"></canvas>
          <div id="row-highlight"><span class="hl-label">drag ↕</span></div>
        </div>
      </div>
    </div>
    <div class="notes-panel" id="notes-panel">
      <button class="notes-toggle" id="notes-toggle" onclick="toggleNotes()">◀</button>
      <div class="notes-content">
        <div class="notes-head">Notes</div>
        <div class="notes-list" id="notes-list"></div>
        <button class="btn-add-note" onclick="addNote()">+ Add Note</button>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let state={projects:[],yarn:[],needles:[],acquire:[],patterns:[]};
let ePId=null,eYId=null,eNId=null,eAId=null;
let pdfDoc=null,pdfPage=1,pdfTotal=1,curPat=null,cVal=1,hlOn=false,nCollapsed=false;
let pdfScale=1,pdfBaseScale=1;
let editPhotos=[];

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function esc(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''; }
function load(){try{const s=localStorage.getItem('ks-v3');if(s)state=JSON.parse(s);}catch(e){}}
function save(){try{localStorage.setItem('ks-v3',JSON.stringify(state));showToast('Saved');}catch(e){showToast('Could not save');}}
function closeModal(id){document.getElementById(id).classList.add('hidden');}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

function switchTab(t){
  document.querySelectorAll('.nav-tab').forEach((el,i)=>el.classList.toggle('active',['projects','stash','patterns'][i]===t));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+(t==='stash'?'stash':t)).classList.add('active');
  if(t==='projects')renderProjects();
  if(t==='stash'){renderYarn();renderNeedles();renderAcquire();}
  if(t==='patterns')renderPatterns();
}

const SL={'not-started':'Not Started','in-progress':'In Progress','completed':'Completed','on-hold':'On Hold'};

/* ── PROJECTS ── */
function renderProjects(){
  const q=(document.getElementById('proj-search').value||'').toLowerCase();
  const fs=document.getElementById('proj-filter-status').value;
  const sort=document.getElementById('proj-sort').value;
  const grid=document.getElementById('projects-grid');
  let list=state.projects.filter(p=>{
    const mq=p.name.toLowerCase().includes(q)||(p.ravelry||'').toLowerCase().includes(q);
    const ms=!fs||p.status===fs;
    return mq&&ms;
  });
  if(sort==='oldest')list=[...list].reverse();
  else if(sort==='name')list=[...list].sort((a,b)=>a.name.localeCompare(b.name));
  else if(sort==='progress')list=[...list].sort((a,b)=>(b.progress||0)-(a.progress||0));
  if(!list.length){grid.innerHTML='<div class="empty-state" style="grid-column:1/-1"><div class="empty-title">No projects yet</div><div class="empty-sub">Cast on your first project above</div></div>';return;}
  grid.innerHTML=list.map(p=>{
    const yarns=(p.yarnIds||[]).map(id=>state.yarn.find(y=>y.id===id)).filter(Boolean);
    const chips=yarns.map(y=>`<span class="yarn-chip" style="background:${y.colour}" title="${esc(y.name)}"></span>`).join('');
    const pat=p.patternId?state.patterns.find(x=>x.id===p.patternId):null;
    const photos=p.photos||[];
    const coverPhoto=photos.length?photos[photos.length-1].data:null;
    const photoEl=coverPhoto?`<img src="${coverPhoto}" alt="">`:'<div class="card-photos-placeholder">No photo yet</div>';
    const photoBadge=photos.length>1?`<div class="photo-count-badge">${photos.length} photos</div>`:'';
    const rav=p.ravelry?`<a href="${esc(p.ravelry)}" target="_blank" rel="noopener">Ravelry ↗</a> · `:'';
    const totalYards=yarns.reduce((s,y)=>(s+(y.yardage||0)*(y.skeins||1)),0);
    const yardWarn=p.targetYards&&totalYards&&totalYards<p.targetYards?`<div class="yardage-warn">⚠ ${totalYards} / ${p.targetYards} yds</div>`:'';
    return `<div class="card">
      <div class="card-photos" onclick="openPhotoViewer('${p.id}')">${photoEl}${photoBadge}</div>
      <div class="card-body">
        <div class="card-title">${esc(p.name)}</div>
        <div class="card-meta">${rav}${p.needle?esc(p.needle):''}</div>
        <div class="card-tags">
          <span class="status-badge status-${p.status}">${SL[p.status]}</span>
          ${pat?`<span class="linked-badge">📄 ${esc(pat.name)}</span>`:''}
        </div>
        <div class="progress-wrap"><div class="progress-fill" style="width:${p.progress||0}%"></div></div>
        <div class="progress-label">${p.progress||0}%</div>
        ${chips?`<div class="chip-row">${chips}</div>`:''}
        ${yardWarn}
      </div>
      <div class="card-footer">
        <button class="btn-sm" onclick="openProjectModal('${p.id}')">Edit</button>
        <button class="btn-sm" onclick="openPhotoViewer('${p.id}')">Photos</button>
        ${pat?`<button class="btn-sm" onclick="openPdf('${pat.id}')">Pattern</button>`:''}
        <button class="btn-sm danger" onclick="delProject('${p.id}')">Delete</button>
      </div>
    </div>`;
  }).join('');
}

function openProjectModal(id){
  ePId=id||null;
  const p=id?state.projects.find(x=>x.id===id):null;
  document.getElementById('proj-modal-title').textContent=p?'Edit Project':'New Project';
  document.getElementById('p-name').value=p?p.name:'';
  document.getElementById('p-status').value=p?p.status:'not-started';
  document.getElementById('p-needle').value=p?(p.needle||''):'';
  document.getElementById('p-ravelry').value=p?(p.ravelry||''):'';
  document.getElementById('p-prog').value=p?(p.progress||0):0;
  document.getElementById('p-prog-val').textContent=p?(p.progress||0):0;
  document.getElementById('p-start').value=p?(p.startDate||''):'';
  document.getElementById('p-end').value=p?(p.endDate||''):'';
  document.getElementById('p-notes').value=p?(p.notes||''):'';
  document.getElementById('p-target-yards').value=p?(p.targetYards||''):'';
  editPhotos=p?(p.photos||[]).map(ph=>({...ph})):[];
  renderEditPhotos();
  const patSel=document.getElementById('p-pattern');
  patSel.innerHTML='<option value="">None</option>'+state.patterns.map(pt=>`<option value="${pt.id}"${p&&p.patternId===pt.id?' selected':''}>${esc(pt.name)}</option>`).join('');
  const selected=p?(p.yarnIds||[]):[];
  const nselected=p?(p.needleIds||[]):[];
  const ysel=document.getElementById('p-yarn-sel');
  ysel.innerHTML=state.yarn.length?state.yarn.map(y=>`<div class="chip-sel-item${selected.includes(y.id)?' selected':''}" data-id="${y.id}" onclick="this.classList.toggle('selected')"><span class="chip-dot" style="background:${y.colour}"></span>${esc(y.name)}</div>`).join(''):'<span style="font-size:12px;color:var(--ink-faint)">No yarn in stash</span>';
  const nsel=document.getElementById('p-needle-sel');
  nsel.innerHTML=state.needles.length?state.needles.map(n=>`<div class="chip-sel-item${nselected.includes(n.id)?' selected':''}" data-id="${n.id}" onclick="this.classList.toggle('selected')">${esc(n.us||n.mm||'?')} ${esc(n.type)}</div>`).join(''):'<span style="font-size:12px;color:var(--ink-faint)">No needles in stash</span>';
  document.getElementById('proj-modal').classList.remove('hidden');
}

function renderEditPhotos(){
  const j=document.getElementById('p-photo-journal');
  j.innerHTML=editPhotos.map((ph,i)=>`
    <div class="photo-thumb-wrap">
      <img class="photo-thumb" src="${ph.data}" onclick="showLightbox('${ph.data}','${ph.date||''}')">
      <button class="photo-thumb-del" onclick="removeEditPhoto(${i})">×</button>
      <div class="photo-thumb-date">${ph.date||''}</div>
    </div>`).join('');
}

function handleProjectPhoto(e){

    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');const mx=900;let w=img.width,h=img.height;
      if(w>mx){h=h*mx/w;w=mx;}if(h>mx){w=w*mx/h;h=mx;}
      c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
      const d=c.toDataURL('image/jpeg',.82);
      const date=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
      editPhotos.push({data:d,date});

    };

  };

  e.target.value='';
}

  pdfScale=1;pdfBaseScale=1;
  pdfjsLib.getDocument(pat.pdfData).promise.then(doc=>{

  }).catch(err=>alert('Could not load PDF: '+err.message));

function renderPdfPage(fitToWidth){
  if(!pdfDoc)return;
  pdfDoc.getPage(pdfPage).then(page=>{
    const area=document.getElementById('pdf-canvas-area');
    const availW=area.clientWidth-40;
    const nativeW=page.getViewport({scale:1}).width;
    pdfBaseScale=availW/nativeW;
    if(fitToWidth)pdfScale=1;
    const scale=pdfBaseScale*pdfScale;
    const vp=page.getViewport({scale});
    const canvas=document.getElementById('pdf-canvas');
    canvas.width=vp.width;canvas.height=vp.height;
    page.render({canvasContext:canvas.getContext('2d'),viewport:vp});
    document.getElementById('pdf-page-info').textContent=pdfPage+' / '+pdfTotal;
    document.getElementById('zoom-info').textContent=Math.round(pdfScale*100)+'%';
    const hl=document.getElementById('row-highlight');
    const pat=state.patterns.find(p=>p.id===curPat);
    const savedRatio=pat&&pat.highlightPos&&pat.highlightPos[pdfPage];
    const topPos=savedRatio?savedRatio*vp.height:vp.height*0.3;
    hl.style.top=topPos+'px';
    if(hlOn)hl.classList.add('visible');else hl.classList.remove('visible');
  });
}

function resetZoom(){pdfScale=1;renderPdfPage(true);}

function changePage(d){
  const n=pdfPage+d;if(n<1||n>pdfTotal)return;
  saveHlRatio();pdfPage=n;renderPdfPage(true);renderNotes();
}

function saveHlRatio(){
  const pat=state.patterns.find(p=>p.id===curPat);if(!pat)return;
  if(!pat.highlightPos)pat.highlightPos={};
  const canvas=document.getElementById('pdf-canvas');
  const top=parseInt(document.getElementById('row-highlight').style.top)||0;
  pat.highlightPos[pdfPage]=canvas.height>0?top/canvas.height:0.3;
  // save silently without toast
  try{localStorage.setItem('ks-v3',JSON.stringify(state));}catch(e){}
}

/* ── PINCH TO ZOOM ── */
let pinchStartDist=0,pinchStartScale=1;
const canvasArea=document.getElementById('pdf-canvas-area');

canvasArea.addEventListener('touchstart',e=>{
  if(e.touches.length===2){
    pinchStartDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    pinchStartScale=pdfScale;
    e.preventDefault();
  }
},{passive:false});

canvasArea.addEventListener('touchmove',e=>{
  if(e.touches.length===2){
    const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    pdfScale=Math.min(4,Math.max(0.5,pinchStartScale*(dist/pinchStartDist)));
    document.getElementById('zoom-info').textContent=Math.round(pdfScale*100)+'%';
    e.preventDefault();
  }
},{passive:false});

canvasArea.addEventListener('touchend',e=>{
  if(e.touches.length<2&&pinchStartDist>0){
    pinchStartDist=0;
    renderPdfPage(false);
  }
});

/* double-tap to zoom */
let lastTap=0;
canvasArea.addEventListener('touchend',e=>{
  if(e.touches.length>0)return;
  const now=Date.now();
  if(now-lastTap<300){
    pdfScale=pdfScale>1.2?1:2;
    renderPdfPage(false);
  }
  lastTap=now;
});

/* swipe pages */
let swipeStartX=0,swipeStartY=0;
canvasArea.addEventListener('touchstart',e=>{
  if(e.touches.length===1){swipeStartX=e.touches[0].clientX;swipeStartY=e.touches[0].clientY;}
},{passive:true});
canvasArea.addEventListener('touchend',e=>{
  if(e.changedTouches.length===1&&pinchStartDist===0){
    const dx=e.changedTouches[0].clientX-swipeStartX;
    const dy=e.changedTouches[0].clientY-swipeStartY;
    if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5){
      if(dx<0)changePage(1);else changePage(-1);
    }
  }
},{passive:true});

/* ── ROW HIGHLIGHT DRAG ── */
const hlEl=document.getElementById('row-highlight');
let drag=false,dY=0,dT=0;
hlEl.addEventListener('mousedown',e=>{drag=true;dY=e.clientY;dT=parseInt(hlEl.style.top)||0;e.preventDefault();});
hlEl.addEventListener('touchstart',e=>{drag=true;dY=e.touches[0].clientY;dT=parseInt(hlEl.style.top)||0;e.stopPropagation();},{passive:true});
document.addEventListener('mousemove',e=>{if(!drag)return;const mx=document.getElementById('pdf-canvas').height-hlEl.offsetHeight;hlEl.style.top=Math.max(0,Math.min(mx,dT+e.clientY-dY))+'px';});
document.addEventListener('touchmove',e=>{if(!drag)return;const mx=document.getElementById('pdf-canvas').height-hlEl.offsetHeight;hlEl.style.top=Math.max(0,Math.min(mx,dT+e.touches[0].clientY-dY))+'px';},{passive:true});
document.addEventListener('mouseup',()=>{if(drag){drag=false;saveHlRatio();}});
document.addEventListener('touchend',()=>{if(drag){drag=false;saveHlRatio();}});

function toggleHighlight(){

  if(!confirm('This will replace all data. Continue?'))return;
  const r=new FileReader();
  r.onload=ev=>{try{state=JSON.parse(ev.target.result);localStorage.setItem('ks-v3',JSON.stringify(state));renderProjects();showToast('Imported!');}catch{alert('Invalid file');}};
  r.readAsText(f);e.target.value='';
}

load();renderProjects();
</script>
</body>
